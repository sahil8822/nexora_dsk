name: nexora_sdk
description: "A cross-platform Flutter hardware SDK with native Android/iOS hardware APIs plus safe web and desktop fallbacks."
publish_to: "none"
version: 4.0.0
homepage: https://github.com/sahil8822/nexora_dsk
repository: https://github.com/sahil8822/nexora_dsk
topics:
  - hardware
  - camera
  - bluetooth
  - sensors
  - cross-platform

environment:
  sdk: ^3.11.4
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  nexora_sdk_platform_interface:
    path: packages/nexora_sdk_platform_interface
  nexora_sdk_android:
    path: packages/nexora_sdk_android
  nexora_sdk_ios:
    path: packages/nexora_sdk_ios
  nexora_sdk_web:
    path: packages/nexora_sdk_web
  nexora_sdk_desktop:
    path: packages/nexora_sdk_desktop
dev_dependencies:
  flutter_test:
    sdk: flutter
  pigeon: ^26.3.4
  very_good_analysis: ^10.2.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' specifies the class (in Java, Kotlin, Swift, Objective-C, etc.)
  # which should be registered in the plugin registry. This is required for
  # using method channels.
  # The Android 'package' specifies package in which the registered class is.
  # This is required for using method channels on Android.
  # The 'ffiPlugin' specifies that native code should be built and bundled.
  # This is required for using `dart:ffi`.
  # All these are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      android:
        default_package: nexora_sdk_android
      ios:
        default_package: nexora_sdk_ios
      macos:
        default_package: nexora_sdk_desktop
      windows:
        default_package: nexora_sdk_desktop
      linux:
        default_package: nexora_sdk_desktop
      web:
        default_package: nexora_sdk_web

  # To add assets to your plugin package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your plugin package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
